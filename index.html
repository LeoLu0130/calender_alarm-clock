<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 AI 鬧鐘日曆 V3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fc-border-color: #f3f4f6; }
        body { font-family: -apple-system, sans-serif; background-color: #ffffff; overflow: hidden; }
        
        /* 日曆全屏化優化 */
        #calendar { 
            height: 80vh !important; 
            padding: 5px;
            font-size: 0.9rem;
        }
        .fc .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 800; }
        .fc .fc-daygrid-day-frame { min-height: 60px !important; }

        /* 懸浮清單按鈕 */
        #listToggleBtn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 30;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        /* 鬧鐘覆蓋層 */
        #alarmOverlay { background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%); }

        /* 獨立清單視窗 (Modal) */
        .full-modal {
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }
        .full-modal.active { transform: translateY(0); }
    </style>
</head>
<body class="bg-white">

    <div id="alarmOverlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center text-white p-6">
        <div class="text-7xl mb-6 animate-bounce">⏰</div>
        <h2 id="alarmTitle" class="text-3xl font-bold mb-10 text-center px-4">時間到！</h2>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="stopAlarm()" class="bg-white text-red-600 font-black py-5 rounded-2xl text-2xl shadow-xl active:scale-95 transition">關閉鬧鐘</button>
            <button onclick="snoozeAlarm()" class="bg-black/20 text-white font-bold py-4 rounded-2xl text-lg border border-white/20">10 分鐘後再提醒</button>
        </div>
    </div>

    <div class="p-4 max-w-md mx-auto">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-gray-900 tracking-tight">📅 備忘錄</h1>
            <button onclick="enableNotification()" id="syncBtn" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold transition active:scale-90">啟動鈴聲</button>
        </header>

        <div id="calendar"></div>
    </div>

    <button id="listToggleBtn" onclick="toggleList(true)" class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold flex items-center gap-2 active:scale-90 transition">
        <span>📋 查看清單</span>
        <span id="taskCount" class="bg-white text-blue-600 w-5 h-5 rounded-full text-[10px] flex items-center justify-center">0</span>
    </button>

    <div id="listModal" class="full-modal fixed inset-0 bg-gray-50 z-40 flex flex-col">
        <div class="p-6 flex justify-between items-center bg-white border-b">
            <h2 class="text-2xl font-black text-gray-800">目前提醒</h2>
            <button onclick="toggleList(false)" class="text-gray-400 font-bold p-2">✕ 關閉</button>
        </div>
        <div id="taskList" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>
    </div>

    <div id="eventModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-40 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[32px] w-full shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-gray-800">新提醒事項</h2>
            <input type="text" id="eventTitle" placeholder="要做什麼？" class="w-full bg-gray-100 border-none rounded-2xl p-4 mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            <label class="block text-xs font-black text-gray-400 uppercase mb-2 ml-1">提醒時間</label>
            <input type="time" id="eventTime" class="w-full bg-gray-100 border-none rounded-2xl p-4 mb-8 text-lg">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-400 font-bold">取消</button>
                <button onclick="saveEvent()" class="flex-1 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedDate;
        let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
        let alarmAudioContext = null;
        let currentActiveAlarm = null;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                height: '100%',
                selectable: true,
                events: reminders,
                dateClick: function(info) {
                    selectedDate = info.dateStr;
                    document.getElementById('eventModal').classList.remove('hidden');
                }
            });
            calendar.render();
            updateTaskUI();
            setInterval(checkAlarms, 10000);
        });

        function toggleList(show) {
            const modal = document.getElementById('listModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        function updateTaskUI() {
            const listEl = document.getElementById('taskList');
            const countEl = document.getElementById('taskCount');
            countEl.innerText = reminders.length;
            
            listEl.innerHTML = reminders.length === 0 ? '<div class="text-center py-20 text-gray-300">目前沒有任何提醒</div>' : '';
            
            reminders.sort((a, b) => new Date(a.start) - new Date(b.start));

            reminders.forEach((ev, index) => {
                const date = new Date(ev.start);
                const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                const dateStr = `${date.getMonth()+1}/${date.getDate()}`;
                
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl border border-gray-100 shadow-sm flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-black text-gray-800 text-lg">${ev.title}</div>
                        <div class="text-sm text-blue-500 font-bold">${dateStr} 的 ${timeStr}</div>
                    </div>
                    <button onclick="deleteEvent(${index})" class="bg-red-50 text-red-500 w-12 h-12 rounded-2xl flex items-center justify-center font-bold">✕</button>
                `;
                listEl.appendChild(div);
            });
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value || "未命名任務";
            const time = document.getElementById('eventTime').value;
            if (!time) return alert("請選擇時間");

            reminders.push({ 
                id: 'id-' + Date.now(),
                title: title, 
                start: selectedDate + 'T' + time, 
                isFired: false 
            });
            syncData();
            closeModal();
            document.getElementById('eventTitle').value = '';
        }

        function deleteEvent(index) {
            reminders.splice(index, 1);
            syncData();
        }

        function syncData() {
            localStorage.setItem('reminders', JSON.stringify(reminders));
            calendar.removeAllEvents();
            calendar.addEventSource(reminders);
            updateTaskUI();
        }

        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }

        function enableNotification() {
            Notification.requestPermission();
            if (!alarmAudioContext) alarmAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('syncBtn').innerText = "✅ 鈴聲已就緒";
            document.getElementById('syncBtn').className = "bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-bold";
        }

        function checkAlarms() {
            if (currentActiveAlarm) return;
            const now = new Date();
            const nowStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}T${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            reminders.forEach((ev) => {
                if (ev.start === nowStr && !ev.isFired) {
                    ev.isFired = true;
                    triggerAlarm(ev);
                    localStorage.setItem('reminders', JSON.stringify(reminders));
                }
            });
        }

        function triggerAlarm(ev) {
            currentActiveAlarm = ev;
            document.getElementById('alarmTitle').innerText = ev.title;
            document.getElementById('alarmOverlay').classList.remove('hidden');
            startBeeping();
        }

        let beepInterval;
        function startBeeping() {
            if (!alarmAudioContext) return;
            beepInterval = setInterval(() => {
                const osc = alarmAudioContext.createOscillator();
                const gain = alarmAudioContext.createGain();
                osc.connect(gain);
                gain.connect(alarmAudioContext.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.3, alarmAudioContext.currentTime);
                osc.start();
                osc.stop(alarmAudioContext.currentTime + 0.1);
            }, 500);
        }

        function stopAlarm() {
            clearInterval(beepInterval);
            currentActiveAlarm = null;
            document.getElementById('alarmOverlay').classList.add('hidden');
        }

        function snoozeAlarm() {
            if (!currentActiveAlarm) return;
            const snoozeDate = new Date(new Date().getTime() + 10 * 60000);
            const snoozeStr = `${snoozeDate.getFullYear()}-${(snoozeDate.getMonth()+1).toString().padStart(2, '0')}-${snoozeDate.getDate().toString().padStart(2, '0')}T${snoozeDate.getHours().toString().padStart(2, '0')}:${snoozeDate.getMinutes().toString().padStart(2, '0')}`;
            reminders.push({ title: "[貪睡] " + currentActiveAlarm.title, start: snoozeStr, isFired: false });
            syncData();
            stopAlarm();
        }
    </script>
</body>
</html>
